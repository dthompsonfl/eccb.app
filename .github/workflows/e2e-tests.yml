name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eccb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Setup environment
        run: |
          echo "DATABASE_URL=mysql://root:root@localhost:3306/eccb_test" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
          echo "STORAGE_DRIVER=LOCAL" >> .env
          echo "NODE_ENV=test" >> .env
          echo "SUPER_ADMIN_EMAIL=admin@eccb.org" >> .env
          echo "SUPER_ADMIN_PASSWORD=some-secure-test-password-123!" >> .env

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run database migrations
        run: pnpm run db:migrate:deploy

      - name: Seed database
        run: pnpm run db:seed

      - name: Run E2E setup
        run: pnpm run test:e2e:setup
        env:
          CI: true

      - name: Run E2E tests
        run: pnpm run test:e2e:ci
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-results.json
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7

      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-videos
          path: test-results/**/*.webm
          retention-days: 7

  # Performance test job
  performance-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eccb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install chromium

      - name: Setup environment
        run: |
          echo "DATABASE_URL=mysql://root:root@localhost:3306/eccb_test" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
          echo "STORAGE_DRIVER=LOCAL" >> .env
          echo "NODE_ENV=test" >> .env
          echo "SUPER_ADMIN_EMAIL=admin@eccb.org" >> .env
          echo "SUPER_ADMIN_PASSWORD=some-secure-test-password-123!" >> .env

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run database migrations
        run: pnpm run db:migrate:deploy

      - name: Seed database
        run: pnpm run db:seed

      - name: Run performance tests
        run: pnpm exec playwright test e2e/public/homepage.spec.ts --grep "Performance" --reporter=list
        env:
          CI: true

  # Accessibility test job
  accessibility-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: e2e-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eccb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install chromium

      - name: Setup environment
        run: |
          echo "DATABASE_URL=mysql://root:root@localhost:3306/eccb_test" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_SECRET=test-secret-key-for-e2e-tests-that-is-long-enough" >> .env
          echo "BETTER_AUTH_URL=http://localhost:3000" >> .env
          echo "NEXT_PUBLIC_APP_URL=http://localhost:3000" >> .env
          echo "STORAGE_DRIVER=LOCAL" >> .env
          echo "NODE_ENV=test" >> .env
          echo "SUPER_ADMIN_EMAIL=admin@eccb.org" >> .env
          echo "SUPER_ADMIN_PASSWORD=some-secure-test-password-123!" >> .env

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run database migrations
        run: pnpm run db:migrate:deploy

      - name: Seed database
        run: pnpm run db:seed

      - name: Run accessibility tests
        run: pnpm exec playwright test e2e/public/homepage.spec.ts --grep "Accessibility" --reporter=list
