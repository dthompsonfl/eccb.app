version: '3.8'
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: eccb_test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - "3306:3306"

  glm-ocr:
    build:
      context: ./services/glm-ocr
    restart: unless-stopped
    gpus: all
    environment:
      MODEL_ID: zai-org/GLM-OCR
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
      MAX_CONCURRENT_REQUESTS: "1"
      MAX_IMAGE_PIXELS: "20000000"
      MAX_NEW_TOKENS: "4096"
      REQUIRE_CUDA: "true"
      GLM_OCR_AUTH_TOKEN: ${GLM_OCR_AUTH_TOKEN:-}
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - glm_ocr_models:/models/huggingface

volumes:
  glm_ocr_models:
